<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Product detail page for Victor Nwoke’s Product Lab tools, SaaS experiments, audit products, report generators, and automation apps."
    />
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../assets/index-D18LbNVd.css" />
    <link rel="stylesheet" href="../../assets/lab.css" />
    <title>Product | Victor Nwoke</title>
    <script>
      (function () {
        try {
          var savedTheme = localStorage.getItem("victor-theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var theme = savedTheme || (prefersDark ? "dark" : "light");
          document.documentElement.classList.toggle("dark", theme === "dark");
          document.documentElement.setAttribute("data-theme", theme);
        } catch (error) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <a class="brand" href="/">
          <span class="brand-mark">VN</span>
          <span>Victor Nwoke</span>
        </a>
        <button class="button menu-toggle" type="button" aria-expanded="false" aria-controls="site-nav" aria-label="Open menu"><span class="menu-toggle-lines" aria-hidden="true"></span></button>
        <nav class="nav-actions" id="site-nav" aria-label="Main navigation">
          <a class="button" href="/products/" data-nav="products">Products</a>
          <a class="button" href="/projects/" data-nav="projects">Projects</a>
          <a class="button" href="/products/vibedeploy/" data-nav="vibedeploy">VibeDeploy</a>
          <a class="button" href="/#contact" data-nav="audit">Audit</a>
          <button class="button theme-toggle" type="button" id="theme-toggle" aria-label="Switch to dark mode">
            <span id="theme-toggle-label">Dark</span>
          </button>
        </nav>
      </header>

      <main id="detail-root"></main>

      <footer class="container footer">
        <p>
          Product Lab by Victor Nwoke. Engineering case studies live at
          <a href="/projects/">/projects/</a>.
        </p>
      </footer>
    </div>

    <script src="../../assets/js/products-data.js"></script>
    <script src="../../assets/js/projects-data.js"></script>
    <script src="../../assets/lab-ui.js"></script>
    <script>
      renderDetailFromPath("product");
    </script>
  </body>
</html>
